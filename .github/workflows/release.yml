name: Release

on:
  push:
    branches: [main]

jobs:
  release:
    # Only run when the commit message starts with "Release "
    # e.g. "Release 1.0.0" or "Release 1.2 – Wedding day build"
    if: startsWith(github.event.head_commit.message, 'Release ')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # ── Extract version from commit message ─────────────────────────────
      # "Release 1.0.0" → version=1.0.0  tag=v1.0.0
      - name: Extract version
        id: meta
        run: |
          MSG=$(echo "${{ github.event.head_commit.message }}" | head -n 1)
          VERSION="${MSG#Release }"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT
          echo "zip=wled-buzzer-${VERSION}.zip" >> $GITHUB_OUTPUT

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: 18

      # ── Build frontend ───────────────────────────────────────────────────
      - name: Build frontend
        working-directory: frontend
        run: npm ci && npm run build

      # ── Install backend deps + package .exe ─────────────────────────────
      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Package Windows .exe
        working-directory: backend
        run: npx pkg server.js --targets node18-win-x64 --output ../dist/wled-buzzer.exe

      # ── Assemble dist/ folder ────────────────────────────────────────────
      - name: Copy frontend assets to dist/public
        run: |
          mkdir -p dist/public
          cp -r frontend/dist/. dist/public/
          if ls frontend/public/*.mp3 2>/dev/null; then
            cp frontend/public/*.mp3 dist/public/
          fi

      # ── Zip ──────────────────────────────────────────────────────────────
      - name: Create release zip
        run: |
          cd dist
          zip -r "../${{ steps.meta.outputs.zip }}" .
          echo "Contents:"
          zipinfo "../${{ steps.meta.outputs.zip }}"

      # ── Publish GitHub Release ───────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ github.event.head_commit.message }}
          files: ${{ steps.meta.outputs.zip }}
          body: |
            ## Installation
            1. Download and unzip `${{ steps.meta.outputs.zip }}`
            2. Double-click `wled-buzzer.exe`
            3. The browser opens automatically at `http://localhost:3001`

            **Requires:** Windows, local Wi-Fi network with WLED buzzers

            ---
            Built from [`${{ github.sha }}`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})
